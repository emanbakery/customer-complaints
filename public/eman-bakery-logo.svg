<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 520" role="img" aria-labelledby="title desc">
  <title id="title">Eman Bakery logo</title>
  <desc id="desc">Green, gold, and red Eman Bakery heritage badge.</desc>
  <defs>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#F4D982"/>
      <stop offset="0.45" stop-color="#C89533"/>
      <stop offset="1" stop-color="#7B4A18"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#176844"/>
      <stop offset="1" stop-color="#082F22"/>
    </linearGradient>
    <linearGradient id="red" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#B9251B"/>
      <stop offset="1" stop-color="#70130F"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <path d="M123 342c50 34 115 52 197 52s147-18 197-52l-23 72c-47 26-105 39-174 39s-127-13-174-39z" fill="url(#red)" stroke="url(#gold)" stroke-width="8"/>
    <ellipse cx="320" cy="226" rx="210" ry="150" fill="url(#green)" stroke="url(#gold)" stroke-width="14"/>
    <ellipse cx="320" cy="226" rx="184" ry="125" fill="none" stroke="#D6A84A" stroke-width="6"/>
    <path d="M121 348c-36 25-63 58-78 98M104 320c-28 8-51 25-68 52M519 348c36 25 63 58 78 98M536 320c28 8 51 25 68 52" fill="none" stroke="url(#gold)" stroke-width="13" stroke-linecap="round"/>
    <g fill="url(#gold)" stroke="#6B3B13" stroke-width="2">
      <path d="M86 286c-23-8-35-27-32-52 23 8 35 27 32 52z"/>
      <path d="M101 236c-21-13-28-34-19-57 21 13 28 34 19 57z"/>
      <path d="M554 286c23-8 35-27 32-52-23 8-35 27-32 52z"/>
      <path d="M539 236c21-13 28-34 19-57-21 13-28 34-19 57z"/>
    </g>
    <text x="320" y="236" text-anchor="middle" font-family="Georgia, serif" font-size="102" font-weight="800" fill="url(#gold)" stroke="#5B3211" stroke-width="3">EMAN</text>
    <text x="320" y="302" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="700" letter-spacing="7" fill="url(#gold)">SINCE : 2007</text>
    <text x="320" y="414" text-anchor="middle" font-family="Georgia, serif" font-size="70" font-weight="800" fill="url(#gold)" stroke="#5B3211" stroke-width="2">BAKERY</text>
    <path id="curve" d="M118 468c95 52 309 52 404 0" fill="none"/>
    <text font-family="Georgia, serif" font-size="29" font-weight="800" fill="url(#gold)" letter-spacing="4">
      <textPath href="#curve" startOffset="50%" text-anchor="middle">THE TASTE OF TRADITION</textPath>
    </text>
  </g>
</svg>
